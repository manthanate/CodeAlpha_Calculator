<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keypad — Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="unit">
  <div class="brand">KEYPAD <span>Mk.1</span></div>

  <div class="screen">
    <div class="screen-history" id="history">&nbsp;</div>
    <div class="screen-main" id="display">0</div>
  </div>

  <div class="pad">
    <button class="key key-fn" data-action="clear">AC</button>
    <button class="key key-fn" data-action="backspace">⌫</button>
    <button class="key key-fn" data-action="percent">%</button>
    <button class="key key-op" data-op="÷">÷</button>

    <button class="key" data-num="7">7</button>
    <button class="key" data-num="8">8</button>
    <button class="key" data-num="9">9</button>
    <button class="key key-op" data-op="×">×</button>

    <button class="key" data-num="4">4</button>
    <button class="key" data-num="5">5</button>
    <button class="key" data-num="6">6</button>
    <button class="key key-op" data-op="−">−</button>

    <button class="key" data-num="1">1</button>
    <button class="key" data-num="2">2</button>
    <button class="key" data-num="3">3</button>
    <button class="key key-op" data-op="+">+</button>

    <button class="key key-zero" data-num="0">0</button>
    <button class="key" data-action="decimal">.</button>
    <button class="key key-equals" data-action="equals">=</button>
  </div>

  <p class="hint">Keyboard supported — numbers, + − * / . Enter, Backspace, Esc</p>
</div>

<script src="script.js"></script>
</body>
</html>
